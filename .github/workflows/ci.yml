name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2

      - name: Typecheck
        run: deno check src/provider.ts

      - name: Smoke test
        run: deno task test:smoke
